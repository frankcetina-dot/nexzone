<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexZone — El Eco del Silencio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #09090b; }
    </style>
</head>
<body class="min-h-screen text-white antialiased">

    <!-- Header -->
    <header class="fixed top-0 inset-x-0 z-50 bg-gradient-to-b from-black/80 to-transparent">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-lg bg-[#e50914] flex items-center justify-center font-bold text-sm">
                    NZ
                </div>
                <span class="text-xl font-semibold tracking-tight">NexZone</span>
            </div>
            <a href="{{ url_for('auth.login') }}"
               class="px-4 py-2 rounded-xl bg-white/10 hover:bg-white/20 text-sm transition-colors">
                Ir al Panel Admin
            </a>
        </div>
    </header>

    <!-- Hero -->
    <section class="relative h-[70vh] min-h-[480px] flex items-end">
        <div class="absolute inset-0 bg-gradient-to-t from-[#09090b] via-[#09090b]/60 to-transparent z-10"></div>
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=1600')] bg-cover bg-center opacity-40"></div>

        <div class="relative z-20 max-w-7xl mx-auto px-6 pb-16 w-full">
            <h1 class="text-4xl md:text-6xl font-bold tracking-tight max-w-2xl">
                El Eco del Silencio
            </h1>
            <p class="mt-4 text-lg text-zinc-300 max-w-xl">
                En un futuro donde los recuerdos pueden ser robados, un detective descubre que su propia identidad es la mayor mentira de todas.
            </p>
            <div class="flex flex-wrap gap-3 mt-8">
                <button class="px-6 py-3 rounded-xl bg-white text-black font-medium hover:bg-zinc-200 transition-colors flex items-center gap-2">
                    <i class="fa-solid fa-play"></i>
                    Reproducir
                </button>
                <button class="px-6 py-3 rounded-xl bg-zinc-700/80 hover:bg-zinc-600 font-medium transition-colors">
                    Más información
                </button>
            </div>
        </div>
    </section>

    <!-- Tendencias -->
    <section class="max-w-7xl mx-auto px-6 py-12">
        <h2 class="text-xl font-semibold mb-6">Tendencias ahora</h2>
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
            {% for i in range(6) %}
            <div class="group cursor-pointer">
                <div class="aspect-[2/3] rounded-xl bg-zinc-800 overflow-hidden mb-2 relative">
                    <img src="https://picsum.photos/seed/{{ i+20 }}/300/450" alt=""
                         class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
                    <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                        <i class="fa-solid fa-play text-2xl"></i>
                    </div>
                </div>
                <p class="text-sm font-medium truncate">Título {{ i+1 }}</p>
                <p class="text-xs text-zinc-500">2026</p>
            </div>
            {% endfor %}
        </div>
    </section>

    <footer class="border-t border-zinc-800 py-8 text-center text-sm text-zinc-600">
        NexZone • Proyecto universitario 2026
    </footer>

</body>
</html>
